<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>減塑小助手</title>
  <link rel="stylesheet" href="style.css">
  <!-- ====== AOS 動畫 CSS ====== -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <!-- ====== 社群分享預覽標籤 (Open Graph) ====== -->
  <meta property="og:title" content="減塑小助手 | 一起為永續生活努力">
  <meta property="og:description" content="提供實用的減塑技巧、綠色生活指南，內建即時碳排放計算機，幫你輕鬆實踐 SDG 12！">
  <meta property="og:image" content="https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&w=1200&q=80">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://yikes0000.github.io/project/index.html">
  <!-- 引入 Chart.js 圖表套件 -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- 導覽列 -->
  <nav class="navbar">
    <div class="logo" data-en="Eco Helper">減塑小助手</div>

    <ul>
      <li><a href="#home" data-en="Home">首頁</a></li>
      <li><a href="#tips" data-en="Tips">減塑技巧</a></li>
      <li><a href="#calculator" data-en="Carbon Calculator">碳排放計算機</a></li>
      <li><a href="#contact" data-en="Contact">聯絡</a></li>
    </ul>

   <div class="nav-right">
      <div class="nav-sdg">SDG 12</div>
      <button id="langToggle" class="lang-btn">EN</button>
      <button class="menu-toggle" aria-expanded="false" aria-label="切換選單">
        <i class="fas fa-bars" aria-hidden="true"></i>
      </button>
    </div>
  </nav>

<main>
    <section class="hero" id="home">
      <h1 class="hero-title" data-en="Strive for a Sustainable Life!">一起為永續生活努力！</h1>
      <p class="hero-subtitle" data-en="Reduce Plastic, Protect the Earth ">減少塑膠，守護地球 </p>
      
   
      
      <a class="hero-btn" href="https://globalgoals.tw/12-responsible-consumption-and-production" target="_blank" rel="noopener" data-en="Learn More">了解更多</a>
    </section>

    <section class="cards" id="tips">
      <div class="card">
        <i class="fas fa-recycle fa-2x" aria-hidden="true"></i>
        <h3 data-en="Reuse">重複使用</h3>
        <p data-en="Bring eco-bags and thermos to reduce single-use plastic.">攜帶環保袋、保溫杯，減少一次性塑膠。</p>
        <a class="card-btn" href="card1.html" data-en="Learn More">了解更多</a>
      </div>

      <div class="card">
        <i class="fas fa-leaf fa-2x" aria-hidden="true"></i>
        <h3 data-en="Green Living">綠色生活</h3>
        <p data-en="Choose natural materials, support sustainable brands.">選擇天然材質產品，支持永續品牌。</p>
        <a class="card-btn" href="card2.html" data-en="Learn More">了解更多</a>
      </div>

      <div class="card">
        <i class="fas fa-lightbulb fa-2x" aria-hidden="true"></i>
        <h3 data-en="Small Changes">小改變大影響</h3>
        <p data-en="A little effort every day adds up to a huge change.">每天一點點努力，累積成巨大的改變。</p>
        <a class="card-btn" href="card3.html" data-en="Learn More">了解更多</a>
      </div>
    </section>
      
      <section class="calculator" id="calculator">
      <h2 data-en="Carbon Footprint Calculator">碳排放計算機</h2>

      <div class="section">
        <label for="classroom" data-en="Classroom (hrs)">一般教室 (小時)</label>
        <input type="number" id="classroom" value="0" min="0" step="0.1">
        <label for="computerClass" data-en="Computer Lab (hrs)">電腦教室 (小時)</label>
        <input type="number" id="computerClass" value="0" min="0" step="0.1">
        <label for="outdoorClass" data-en="Outdoor Class (hrs)">戶外課程 (小時)</label>
        <input type="number" id="outdoorClass" value="0" min="0" step="0.1">
      </div>

      <div class="section">
        <label for="mobile" data-en="Mobile Usage (hrs)">手機使用 (小時)</label>
        <input type="number" id="mobile" value="0" min="0" step="0.1">
      </div>

      <div class="section">
        <label for="meatMeal" data-en="Meat Meal (meals)">葷食 (餐)</label>
        <input type="number" id="meatMeal" value="0" min="0" step="1">
        <label for="vegMeal" data-en="Veg Meal (meals)">素食 (餐)</label>
        <input type="number" id="vegMeal" value="0" min="0" step="1">
      </div>

      <div class="section">
        <label for="computer" data-en="PC Usage (hrs)">電腦使用 (小時)</label>
        <input type="number" id="computer" value="0" min="0" step="0.1">
      </div>

      <button class="calc-btn" id="calcBtn" data-en="Calculate">計算</button>
      <div id="result" role="status" aria-live="polite"></div>
        <!-- 新增：用來顯示圖表的畫布 (預設先隱藏，計算後才顯示) -->
      <canvas id="carbonChart" style="max-width: 100%; max-height: 250px; margin: 20px auto; display: none;"></canvas>
    </section>
  </main>

  <footer id="contact">
    <p data-en="© 2026 Eco Helper | Contact: info@example.com">© 2026 減塑小助手 | 聯絡我們：wei</p>
    
    <div style="margin-top: 12px; display: flex; justify-content: center; align-items: center;">
      <span style="font-size: 0.9em; margin-right: 8px;" data-en="Total Visitors:">累積瀏覽人次：</span>
      <img src="https://count.getloli.com/get/@eco-helper-2026?theme=moebooru" alt="訪客計數器" style="height: 20px;">
    </div>
    
    <div class="social">
      <a href="#" aria-label="Facebook"><i class="fab fa-facebook" aria-hidden="true"></i></a>
      <a href="#" aria-label="Instagram"><i class="fab fa-instagram" aria-hidden="true"></i></a>
      <a href="#" aria-label="Twitter"><i class="fab fa-twitter" aria-hidden="true"></i></a>
    </div>
  </footer>

  <button id="backToTop" aria-label="回到頂端" title="回到頂端">
    <i class="fas fa-arrow-up"></i>TOP
  </button>

  <script src="script.js" defer></script>
</body>
</html>
