<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>減塑小助手 | SDG 12</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #f4f7f6; }
        .hero-section { background: linear-gradient(135deg, #198754 0%, #20c997 100%); color: white; padding: 100px 0; }
        .quote-container { background: rgba(255, 255, 255, 0.1); border-left: 5px solid #fff; padding: 20px; border-radius: 5px; margin-top: 30px; }
        .card { border: none; transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); }
        #result-box { display: none; } /* 初始隱藏計算結果 */
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">🌱 SDG 12 減塑生活</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">首頁</a></li>
                    <li class="nav-item"><a class="nav-link" href="#calculator">減塑計算機</a></li>
                    <li class="nav-item"><a class="nav-link" href="#about">關於我們</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-3 fw-bold">開始你的減塑日常</h1>
            <p class="lead">簡單的舉動，就能讓地球更美好。</p>
            
            <div class="quote-container mx-auto" style="max-width: 600px;">
                <p class="mb-0 fs-5">今日減塑語錄：</p>
                <p class="h3 mt-2">「 {{ quote }} 」</p>
            </div>
        </div>
    </header>

    <main class="container my-5" id="calculator">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center mb-4">
                <h2>減塑潛力計算機</h2>
                <p class="text-muted">看看你一年的改變有多巨大！</p>
            </div>
            
            <div class="col-md-6">
                <div class="card shadow-lg p-4">
                    <div class="mb-4">
                        <label for="bagInput" class="form-label fw-bold">你每天預計省下幾個塑膠袋？</label>
                        <input type="number" id="bagInput" class="form-control form-control-lg" placeholder="請輸入數字，例如：2">
                    </div>
                    <button class="btn btn-success btn-lg w-100" onclick="runCalculation()">立即計算</button>
                    
                    <div id="result-box" class="mt-4 p-3 bg-light rounded border border-success">
                        <h4 class="text-success mb-2">計算結果：</h4>
                        <p id="resultText" class="fs-5 mb-0"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <section class="bg-white py-5" id="about">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h2 class="mb-4">關於 SDG 12</h2>
                    <p class="fs-5 text-secondary">負責任的消費與生產，意味著在日常生活中減少廢棄物產生。透過「重複使用」與「拒絕一次性塑膠」，我們每個人都能為永續發展做出貢獻。</p>
                </div>
                <div class="col-md-6 text-center">
                    <img src="https://images.unsplash.com/photo-1591193520257-c030ea857817?auto=format&fit=crop&w=500&q=80" alt="環保圖片" class="img-fluid rounded shadow">
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-4">
        <div class="container">
            <p class="mb-1">內容來源：聯合國 SDG 12 </p>
            <small class="text-secondary">© 2026 減塑小助手</small>
        </div>
    </footer>

    <script>
        function runCalculation() {
            const input = document.getElementById('bagInput');
            const resultBox = document.getElementById('result-box');
            const resultText = document.getElementById('resultText');
            
            let bags = parseInt(input.value);
            
            if (isNaN(bags) || bags <= 0) {
                alert("請輸入有效的數字喔！");
                return;
            }
            
            // 邏輯運算：一天省幾個 * 一年 365 天
            let totalPerYear = bags * 365;
            
            // 顯示結果
            resultText.innerText = `如果你每天省下 ${bags} 個塑膠袋，一年後你將減少 ${totalPerYear} 個垃圾！這相當於為海洋減少了巨大的負擔。`;
            resultBox.style.display = 'block';
            
            // 自動捲動到結果區
            resultBox.scrollIntoView({ behavior: 'smooth' });
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
