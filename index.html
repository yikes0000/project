  <style>
    body { margin: 0; font-family: Arial, sans-serif; line-height: 1.6; }
    .navbar { display: flex; justify-content: space-between; align-items: center; background: #2c3e50; padding: 10px 20px; position: fixed; width: 100%; top: 0; z-index: 1000; }
    .navbar ul { list-style: none; display: flex; gap: 20px; }
    .navbar a { color: #fff; text-decoration: none; }
    .navbar a:hover { color: #f39c12; }
    .logo { color: #fff; font-weight: bold; }
    .menu-toggle { display: none; font-size: 24px; color: #fff; cursor: pointer; }

    .hero { background: url('https://source.unsplash.com/1600x900/?nature,eco') no-repeat center center/cover; color: #fff; text-align: center; padding: 120px 20px; }
    .hero button { background: #f39c12; border: none; padding: 10px 20px; cursor: pointer; }
    .hero button:hover { background: #d35400; }

    .cards { display: flex; justify-content: center; gap: 20px; padding: 80px 20px; flex-wrap: wrap; }
    .card { background: #ecf0f1; padding: 20px; border-radius: 8px; text-align: center; width: 250px; transition: transform 0.3s; }
    .card:hover { transform: translateY(-10px); }

    .calculator { background: #ecf0f1; padding: 40px 20px; text-align: center; margin: 40px auto; border-radius: 8px; max-width: 600px; }
    .calculator h2 { margin-bottom: 20px; }
    .section { margin-bottom: 20px; text-align: left; }
    label { display: block; margin: 8px 0 4px; }
    input { padding: 8px; width: 100%; }
    button.calc-btn { background: #27ae60; color: #fff; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
    button.calc-btn:hover { background: #1e8449; }
    #result { margin-top: 20px; font-weight: bold; text-align: center; }

    footer { background: #2c3e50; color: #fff; text-align: center; padding: 20px; }
    footer .social a { color: #fff; margin: 0 10px; }
    footer .social a:hover { color: #f39c12; }

    #backToTop { position: fixed; bottom: 30px; right: 30px; background: #f39c12; border: none; padding: 10px; border-radius: 50%; cursor: pointer; display: none; }
    #backToTop i { color: #fff; }

    @media (max-width: 768px) {
      .menu-toggle { display: block; }
      .navbar ul { flex-direction: column; background: #34495e; position: absolute; top: 50px; right: 0; display: none; width: 200px; }
      .navbar ul.show { display: flex; }
      .cards { flex-direction: column; align-items: center; }
    }
  </style>
