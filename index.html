<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>減塑小助手</title>
  <meta name="description" content="減塑小助手：減少塑膠、計算碳排放、分享減塑技巧。">
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
  <nav class="navbar">
    <div class="logo">減塑小助手</div>
    <button class="menu-toggle" aria-expanded="false" aria-label="切換選單">
      <i class="fas fa-bars" aria-hidden="true"></i>
    </button>
    <ul>
      <li><a href="#home">首頁</a></li>
      <li><a href="#about">關於我們</a></li>
      <li><a href="#tips">減塑技巧</a></li>
      <li><a href="#calculator">碳排放計算機</a></li>
      <li><a href="#contact">聯絡</a></li>
    </ul>
  </nav>

  <main>
    <section class="hero" id="home">
      <h1>一起為永續生活努力！</h1>
      <p>減少塑膠，守護地球 🌍</p>
      <button class="hero-btn">了解更多</button>
    </section>

    <section class="cards" id="tips">
      <div class="card">
        <i class="fas fa-recycle fa-2x" aria-hidden="true"></i>
        <h3>重複使用</h3>
        <p>攜帶環保袋、保溫杯，減少一次性塑膠。</p>
      </div>
      <div class="card">
        <i class="fas fa-leaf fa-2x" aria-hidden="true"></i>
        <h3>綠色生活</h3>
        <p>選擇天然材質產品，支持永續品牌。</p>
      </div>
      <div class="card">
        <i class="fas fa-lightbulb fa-2x" aria-hidden="true"></i>
        <h3>小改變大影響</h3>
        <p>每天一點點努力，累積成巨大的改變。</p>
      </div>
    </section>

    <section class="calculator" id="calculator" aria-labelledby="calc-title">
      <h2 id="calc-title">碳排放計算機</h2>
      <div class="section">
        <label for="classroom">一般教室 小時</label>
        <input type="number" id="classroom" value="0" min="0" step="0.1">
        <label for="computerClass">電腦教室 小時</label>
        <input type="number" id="computerClass" value="0" min="0" step="0.1">
        <label for="outdoorClass">戶外課程 小時</label>
        <input type="number" id="outdoorClass" value="0" min="0" step="0.1">
      </div>
      <div class="section">
        <label for="mobile">手機使用 小時</label>
        <input type="number" id="mobile" value="0" min="0" step="0.1">
      </div>
      <div class="section">
        <label for="meatMeal">葷食 餐</label>
        <input type="number" id="meatMeal" value="0" min="0" step="1">
        <label for="vegMeal">素食 餐</label>
        <input type="number" id="vegMeal" value="0" min="0" step="1">
      </div>
      <div class="section">
        <label for="computer">電腦使用 小時</label>
        <input type="number" id="computer" value="0" min="0" step="0.1">
      </div>
      <button class="calc-btn" id="calcBtn">計算</button>
      <div id="result" role="status" aria-live="polite"></div>
    </section>
  </main>

  <footer id="contact">
    <p>© 2026 減塑小助手 | 聯絡我們：info@example.com</p>
    <div class="social" aria-hidden="false">
      <a href="#" aria-label="Facebook"><i class="fab fa-facebook" aria-hidden="true"></i></a>
      <a href="#" aria-label="Instagram"><i class="fab fa-instagram" aria-hidden="true"></i></a>
      <a href="#" aria-label="Twitter"><i class="fab fa-twitter" aria-hidden="true"></i></a>
    </div>
  </footer>

  <button id="backToTop" aria-label="回到頂端" title="回到頂端">
    <i class="fas fa-arrow-up" aria-hidden="true"></i>
  </button>

  <script src="script.js" defer></script>
</body>
</html>
