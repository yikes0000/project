<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>減塑小助手</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 確保全螢幕區塊不會被其他樣式干擾，
           這段可以直接加在這裡，或整合進 style.css (建議後者) */
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>
    <section class="fullscreen-hero">
        <div class="fs-hero-content">
            <h1 class="fs-title" data-en="Together for Sustainable Living" data-zh="一起為永續生活努力">一起為永續生活努力</h1>
            <a href="#navbar" class="fs-button" data-en="Learn More" data-zh="了解更多">了解更多</a>
        </div>
    </section>

    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="#" class="logo">Plastic Free Helper</a>
            <ul class="nav-links">
                <li><a href="#tips" data-en="Reduction Tips" data-zh="減塑小撇步">減塑小撇步</a></li>
                <li><a href="#calculator" data-en="Footprint Calculator" data-zh="碳足跡計算機">碳足跡計算機</a></li>
                <li><button id="lang-switch">English</button></li>
            </ul>
        </div>
    </nav>

    <section class="scroll-down-intro">
        <div class="container">
            <h1 class="zh-text">綠色生活, 從減塑開始</h1>
            <h2 class="en-text">Green Life, Starts with Reducing Plastic</h2>
        </div>
    </section>

    <div class="card-calculator-container">
        <section class="cards" id="tips">
            <div class="container">
                <a href="card1.html" class="card">
                    <img src="減塑1.png" alt="Card 1" class="card-img">
                    <p class="zh-text">重複使用水瓶和購物袋</p>
                    <p class="en-text">Reuse Water Bottles & Bags</p>
                </a>
                <a href="card2.html" class="card">
                    <img src="減塑2.png" alt="Card 2" class="card-img">
                    <p class="zh-text">拒絕一次性餐具</p>
                    <p class="en-text">Say No to Single-Use Utensils</p>
                </a>
                <a href="card3.html" class="card">
                    <img src="減塑3.png" alt="Card 3" class="card-img">
                    <p class="zh-text">購買無包裝商品</p>
                    <p class="en-text">Choose Package-Free Products</p>
                </a>
            </div>
        </section>

        <section class="calculator" id="calculator">
            <div class="container">
                <h2 data-en="Carbon Footprint Calculator" data-zh="碳足跡計算機">碳足跡計算機</h2>
                <div class="calculator-box">
                    <div class="input-group">
                        <label for="plastic-bags" data-en="Plastic Bags per week" data-zh="每週使用塑膠袋數量：">每週使用塑膠袋數量：</label>
                        <input type="number" id="plastic-bags" min="0" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label for="plastic-bottles" data-en="Plastic Bottles per week" data-zh="每週使用塑膠瓶數量：">每週使用塑膠瓶數量：</label>
                        <input type="number" id="plastic-bottles" min="0" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label for="disposable-utensils" data-en="Single-use Utensils per week" data-zh="每週使用一次性餐具數量：">每週使用一次性餐具數量：</label>
                        <input type="number" id="disposable-utensils" min="0" placeholder="0">
                    </div>
                    <button onclick="calculateFootprint()" data-en="Calculate" data-zh="開始計算">開始計算</button>
                    <div id="result"></div>
                </div>
            </div>
        </section>
    </div>

    <footer class="footer">
        <p data-en="© 2024 Plastic Free Helper. Dedicated to Sustainability." data-zh="© 2024 減塑小助手。一起為地球努力。">© 2024 減塑小助手。一起為地球努力。</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
